name: Flutter Build & Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-android:
    name: Build Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Fix formatting
        run: dart format lib test

      - name: Analyze project (non-blocking)
        run: flutter analyze --no-fatal-infos || true
        continue-on-error: true

      - name: Run tests (non-blocking)
        run: flutter test || true
        continue-on-error: true

      - name: Create placeholder google-services.json
        run: |
          mkdir -p android/app
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-ci",
              "storage_bucket": "placeholder-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.habittracker"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Create local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          cat android/local.properties

      - name: Build release APK
        run: |
          flutter build apk --release || {
            echo "=== BUILD FAILED ==="
            echo "--- Gradle error log ---"
            find android -name "*.log" -type f | head -5 | xargs -I{} sh -c 'echo "=== {} ==="; cat {}' 2>/dev/null || true
            echo "--- Build output ---"
            ls -la build/app/outputs/ 2>/dev/null || true
            exit 1
          }

      - name: Copy APK to flutter_app/app-release.apk
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk app-release.apk
          ls -la app-release.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: init-habits-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Commit & push updated APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd ${{ github.workspace }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flutter_app/app-release.apk
          git status
          git diff --cached --quiet || git commit -m "ci: update app-release.apk [skip ci]"
          git push origin HEAD:main
