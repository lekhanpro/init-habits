name: Flutter Build Android & iOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-android:
    name: Build Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Check Firebase auth configuration
        run: dart run tool/check_firebase_config.dart

      - name: Configure Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
            {
              echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
              echo "keyPassword=$ANDROID_KEY_PASSWORD"
              echo "keyAlias=$ANDROID_KEY_ALIAS"
              echo "storeFile=upload-keystore.jks"
            } > android/key.properties
            echo "Release signing configured from GitHub secrets."
          else
            echo "::warning::Android signing secrets are not configured. APK will be debug-signed, and Google Sign-In may fail unless Firebase has that signing key SHA."
          fi

      - name: Fix formatting
        run: dart format lib test

      - name: Analyze project (non-blocking)
        run: flutter analyze --no-fatal-infos || true
        continue-on-error: true

      - name: Run tests (non-blocking)
        run: flutter test || true
        continue-on-error: true

      - name: Create local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          cat android/local.properties

      - name: Verify google-services.json is present
        run: |
          if [ ! -f android/app/google-services.json ]; then
            echo "::error::android/app/google-services.json missing — Firebase auth will not work in the built APK"
            exit 1
          fi
          PROJECT_ID=$(grep -o '"project_id": *"[^"]*"' android/app/google-services.json | head -1)
          echo "Using committed google-services.json ($PROJECT_ID)"

      - name: Build release APK
        run: |
          flutter build apk --release --no-shrink 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: flutter_app/build.log
          if-no-files-found: ignore

      - name: Commit build log on failure
        if: failure()
        run: |
          cd ${{ github.workspace }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash push --include-untracked -m "ci-temp" || true
          git checkout -B ci-logs
          cp flutter_app/build.log build-log.txt 2>/dev/null || echo "no build.log" > build-log.txt
          git add build-log.txt
          git commit -m "ci: build log $(date -u +%Y%m%d_%H%M%S) [skip ci]"
          git push origin ci-logs --force

      - name: Copy APK to flutter_app/app-release.apk
        if: success()
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk app-release.apk
          ls -la app-release.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: init-habits-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Commit & push updated APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd ${{ github.workspace }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flutter_app/app-release.apk
          git status
          git diff --cached --quiet || git commit -m "ci: update app-release.apk [skip ci]"
          git push origin HEAD:main

  build-ios:
    name: Build Unsigned iOS App
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Check Firebase auth configuration
        run: dart run tool/check_firebase_config.dart

      - name: Build unsigned iOS release app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned iOS app
        run: |
          cd build/ios/iphoneos
          zip -r init-habits-ios-unsigned-app.zip Runner.app

      - name: Upload unsigned iOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: init-habits-ios-unsigned-app
          path: flutter_app/build/ios/iphoneos/init-habits-ios-unsigned-app.zip
          if-no-files-found: error
