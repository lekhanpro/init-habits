name: Flutter Build & Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-android:
    name: Build Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Fix formatting
        run: dart format lib test

      - name: Analyze project (non-blocking)
        run: flutter analyze --no-fatal-infos || true
        continue-on-error: true

      - name: Run tests (non-blocking)
        run: flutter test || true
        continue-on-error: true

      - name: Create local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          cat android/local.properties

      - name: Generate placeholder google-services.json
        run: |
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "123456789012",
              "project_id": "init-habits-ci-placeholder",
              "storage_bucket": "init-habits-ci-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789012:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.habittracker"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyDPlaceholderKeyForCIBuildOnly0000000"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Build release APK
        run: |
          flutter build apk --release --no-shrink 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: flutter_app/build.log
          if-no-files-found: ignore

      - name: Commit build log on failure
        if: failure()
        run: |
          cd ${{ github.workspace }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash push --include-untracked -m "ci-temp" || true
          git checkout -B ci-logs
          cp flutter_app/build.log build-log.txt 2>/dev/null || echo "no build.log" > build-log.txt
          git add build-log.txt
          git commit -m "ci: build log $(date -u +%Y%m%d_%H%M%S) [skip ci]"
          git push origin ci-logs --force

      - name: Copy APK to flutter_app/app-release.apk
        if: success()
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk app-release.apk
          ls -la app-release.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: init-habits-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Commit & push updated APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd ${{ github.workspace }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flutter_app/app-release.apk
          git status
          git diff --cached --quiet || git commit -m "ci: update app-release.apk [skip ci]"
          git push origin HEAD:main
